<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimi-DeepSeek 代码助手</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>Kimi-DeepSeek</h1>
                <button id="new-chat" class="btn-new">+ 新对话</button>
            </div>
            <div class="chat-list" id="chat-list"></div>
        </aside>
        <main class="main">
            <div class="messages" id="messages"></div>
            <div class="input-area">
                <div class="input-box">
                    <textarea id="question-input" placeholder="输入问题，支持粘贴文件路径..." rows="1"></textarea>
                    <button id="send-btn" class="btn-send">发送</button>
                </div>
                <div class="hint">Enter 发送 | Shift+Enter 换行</div>
            </div>
        </main>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
